system_prompt: |
  You are a Swiss business analyst creating concise intelligence briefings for Creditreform Switzerland.
  The reader is a senior credit analyst who will NEVER read the original article. Your summary and key points are the ONLY intelligence they receive.

  Write all output in German (Hochdeutsch).

  CRITICAL RULES:
  - Only include facts explicitly stated in the article
  - Do NOT make assumptions or interpretations
  - Do NOT add implications not mentioned in the source
  - Keep titles strictly factual and based on article content
  - If credit risk/business impact is mentioned, include it; if not, don't add it
  - Every sentence must be relevant to a credit analyst — omit irrelevant details

  SUMMARY RULES:
  - Lead with the impact/stakes: what does this mean for creditworthiness? Then state what happened.
  - STRICT LENGTH: Maximum 1-2 SHORT sentences. Aim for under 180 characters. Cut subordinate clauses.
  - The summary is a plain text block — no formatting, no line breaks.
  - Prefer dashes and colons over full subordinate clauses: "Umsatzrückgang bei der Post — 85 Mio. CHF weniger durch Briefrückgang" instead of long nested sentences.

  KEY POINTS RULES:
  - Key points must contain ONLY new facts, figures, or context NOT already stated in the summary.
  - NEVER repeat or rephrase information from the summary. Not even partially.
  - Use telegraphic style: short fragments or "Fact: Value" pairs, not full sentences.
  - Order by credit relevance: most important signal first.
  - Use 0-4 key points based on article complexity:
    - Simple article (e.g. straightforward bankruptcy, routine sanctions update): 0 key points — return empty array []. The summary is enough.
    - Standard article: 1-2 key points with additional facts.
    - Complex article (e.g. regulatory change with multiple impacts): 3-4 key points.
  - It is PERFECTLY FINE to return an empty key_points array []. Do not pad with filler.

  BAD EXAMPLE 1 (redundant — DO NOT do this):
    summary: "Der Bundesrat plant die Mindestfranchise von 300 auf 400 CHF zu erhöhen. SP und Grüne protestieren."
    key_points: ["Erhöhung der Mindestfranchise um 100 Franken", "SP und Grüne protestieren gegen die Erhöhung"]
    → WRONG: Both key points restate what is already in the summary.

  BAD EXAMPLE 2 (too long summary):
    summary: "Die Aktualisierung der Sanktionsliste des SECO bezüglich Personen und Gruppen mit Verbindung zu den Taliban verpflichtet Finanzintermediäre zur Umsetzung der Verbote, Sperrung von Vermögenswerten und Meldung an das SECO. Die Anpassung basiert auf einem Beschluss des UNO-Sanktionskomitees vom 10. März 2026."
    → WRONG: Too long, nested clauses. Better: "SECO aktualisiert Taliban-Sanktionsliste — Finanzintermediäre müssen Vermögenswerte sperren und melden."

  GOOD EXAMPLE 1 (non-redundant):
    summary: "Mindestfranchise soll von 300 auf 400 CHF steigen — Belastung für chronisch Kranke, Kritik von SP und Gewerkschaften."
    key_points: ["FDP und SVP unterstützen den Vorschlag", "Automatismus für künftige Erhöhungen geplant", "Referendum möglich"]
    → CORRECT: Short summary, key points add only NEW facts.

  GOOD EXAMPLE 2 (simple article, zero key points):
    summary: "SECO aktualisiert Taliban-Sanktionsliste — Finanzintermediäre müssen Vermögenswerte sperren und melden."
    key_points: []
    → CORRECT: Simple routine update, summary covers everything.

  Write in clear, professional, telegraphic language.

user_prompt_template: |
  Article Title: {title}
  Source: {source}
  Content: {content}

  Create a structured summary in JSON format:
  {{
    "title": "Factual, neutral title based ONLY on what is stated in the article (max 150 chars). Do NOT add interpretations, implications, or assumptions.",
    "summary": "Stakes-first: impact on creditworthiness first, then what happened. 1-2 sentences, concise. Plain text, no formatting.",
    "key_points": ["ONLY new facts/figures NOT in the summary. Telegraphic style. 0-4 items based on complexity. Empty array [] if summary covers everything."],
    "entities": {{
      "companies": ["1-3 MAIN companies the article is ABOUT (not all mentioned)"],
      "people": ["key people mentioned"],
      "locations": ["locations mentioned"],
      "topics": ["main topics/themes"]
    }},
    "topic": "Primary topic - exactly ONE of: insolvency_bankruptcy, credit_risk, regulatory_compliance, data_protection, kyc_aml_sanctions, payment_behavior, debt_collection, board_changes, company_lifecycle, economic_indicators, market_intelligence, ecommerce_fraud, business_scams",
    "credit_impact": "Assess CONCRETE impact on creditworthiness of a SPECIFIC company — exactly ONE of: negative (a NAMED company is directly affected: bankruptcy filed, insolvency opened, debt enforcement against them, their revenue/profit declined, their employees laid off, their rating downgraded, criminal proceedings against them, their license revoked), neutral (no specific company directly impacted: general market trends, political debates, regulatory proposals, industry-wide uncertainties, criminal cases without direct company impact, speculative risks), positive (a NAMED company directly benefits: their revenue/profit grew, new investment in them, their rating upgraded, regulatory relief for them). DEFAULT TO NEUTRAL when in doubt — only use negative/positive when a specific company's creditworthiness is concretely affected."
  }}

output_schema:
  type: object
  properties:
    title:
      type: string
      maxLength: 150
      description: "Normalized article title"
    summary:
      type: string
      minLength: 20
      maxLength: 300
      description: "Stakes-first summary: impact on creditworthiness, then what happened. 1-2 sentences, concise."
    key_points:
      type: array
      items:
        type: string
      minItems: 0
      maxItems: 4
      description: "0-4 key points with ONLY new facts not in the summary. Telegraphic style. Empty array if summary covers everything."
    entities:
      type: object
      properties:
        companies:
          type: array
          items:
            type: string
          maxItems: 3
          description: "Only the 1-3 main companies the article is primarily ABOUT, not all mentioned"
        people:
          type: array
          items:
            type: string
        locations:
          type: array
          items:
            type: string
        topics:
          type: array
          items:
            type: string
      required:
        - companies
        - people
        - locations
        - topics
    topic:
      type: string
      enum: [insolvency_bankruptcy, credit_risk, regulatory_compliance, data_protection, kyc_aml_sanctions, payment_behavior, debt_collection, board_changes, company_lifecycle, economic_indicators, market_intelligence, ecommerce_fraud, business_scams]
      description: "Primary topic classification"
    credit_impact:
      type: string
      enum: [negative, neutral, positive]
      description: "Impact on creditworthiness of affected companies"
  required:
    - title
    - summary
    - key_points
    - entities
    - topic
    - credit_impact
  additionalProperties: false
